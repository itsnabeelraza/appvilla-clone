<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Appvilla</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style/style.css">
  <link rel="stylesheet" href="./style/login.css">
  <link rel="shortcut icon" type="image/x-icon" href="./images/favicon/favicon.svg" />
</head>

<body class="luxury-login-body">

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="row w-100 justify-content-center">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="login-card">
          <div class="text-center mb-5">
            <h2 class="luxury-brand">Appvilla</h2>
            <p class="luxury-subtitle">Welcome back to the exclusive experience.</p>
          </div>

          <form>
            <div class="mb-4">
              <label for="email" class="form-label luxury-label">Email Address</label>
              <div class="input-group luxury-input-group">
                <span class="input-group-text"><i class="ri-mail-line"></i></span>
                <input type="email" class="form-control luxury-input" id="email" placeholder="name@example.com">
              </div>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label luxury-label">Password</label>
              <div class="input-group luxury-input-group">
                <span class="input-group-text"><i class="ri-lock-2-line"></i></span>
                <input type="password" class="form-control luxury-input" id="password" placeholder="Enter your password">
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input luxury-check" type="checkbox" id="remember">
                <label class="form-check-label luxury-label-sm" for="remember">Remember me</label>
              </div>
              <a href="#" class="luxury-link">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-luxury w-100 py-2">Sign In</button>
          </form>

          <div class="text-center mt-4">
            <p class="luxury-text-muted">Don't have an account? <a href="#" class="luxury-link-bold">Sign Up</a></p>
            <a href="index.html" class="luxury-back-link"><i class="ri-arrow-left-line"></i> Back to Home</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
